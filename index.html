        .btn-host { background-color: #8e44ad; color: white; font-size: 0.9em; padding: 10px 20px; position: absolute; top: 20px; right: 20px; border:none; border-radius:5px; cursor:pointer; font-weight:bold; z-index: 100;}

        .btn-host-action:hover { opacity: 0.8; }
        .btn-host-team { background-color: #f39c12; flex:1;}
        .btn-host-start { background-color: #27ae60; }
        .btn-host-reveal { background-color: #3498db; }
        .btn-host-end { background-color: #c0392b; }
        .btn-host-reset { background-color: #e74c3c; margin-top: 0; margin-bottom: 15px;}

        /* 分隊顯示 (老師端) */
        .host-team-columns { display: grid; gap: 15px; margin-top: 15px; }
        .grid-2 { grid-template-columns: repeat(2, 1fr); }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }
        .grid-4 { grid-template-columns: repeat(4, 1fr); }
        @media (max-width: 700px) { .host-team-columns { grid-template-columns: 1fr; } }

        .player-tag.submitted { border-color: #2ecc71; box-shadow: 0 0 5px rgba(46, 204, 113, 0.5); }
        .player-tag.correct-tag { border-color: #2ecc71; background: #d4edda; color: #155724; }
        .player-tag.wrong-tag { border-color: #e74c3c; background: #f8d7da; color: #721c24; }

        /* 隊伍專屬顏色 */
        .team-1-bg { background-color: #fff3cd; border-color: #ffc107; color: #856404; } /* 皮卡丘(黃) */
        .team-2-bg { background-color: #f8d7da; border-color: #dc3545; color: #721c24; } /* 噴火龍(紅) */
        .team-3-bg { background-color: #d4edda; border-color: #28a745; color: #155724; } /* 妙蛙種子(綠) */
        .team-4-bg { background-color: #d1ecf1; border-color: #17a2b8; color: #0c5460; } /* 傑尼龜(藍) */

        /* 老師端題目顯示 */
        #host-question-display { display:none; background:white; padding:20px; border-radius:8px; margin-top:20px; border:2px solid #bdc3c7;}
        .host-option-list { font-size: 1.1em; line-height: 1.8; list-style-type: none; padding-left: 0;}
        .host-option-list li { margin-bottom: 8px; padding: 8px; background: #f8f9fa; border-radius: 5px;}
        .host-option-list li b { color: #2980b9; margin-right: 10px; }

        .timer.danger { color: #e74c3c; animation: blink 1s infinite;}
        @keyframes blink { 50% { opacity: 0.5; } }

        /* 測驗區域 (學生) */

        .question-title { font-size: 1.3em; font-weight: bold; margin-bottom: 20px; color: #2c3e50; line-height: 1.4;}
        .option { display: block; background: #ecf0f1; border: 2px solid #bdc3c7; border-radius: 8px; padding: 15px; margin-bottom: 12px; cursor: pointer; transition: 0.2s; font-size: 1.1em; }
        .option:hover { background: #e0e6e8; }
        .option.selected { border-color: #3498db; background: #d6eaf8; box-shadow: 0 0 5px rgba(52, 152, 219, 0.5);}
        .option.correct { background-color: #d4edda; border-color: #28a745; color: #155724; font-weight:bold; }

        .btn-submit:hover:not(:disabled) { background-color: #2980b9; transform: translateY(-2px);}
        .btn-submit:disabled { background-color: #bdc3c7; box-shadow: none; cursor: not-allowed; color: #7f8c8d; }
        .feedback { font-size: 1.5em; font-weight: bold; margin-top: 20px; text-align: center; }

        /* 結算畫面 */
        #result-screen { text-align: center; display: none; }
        .score-display { font-size: 4em; color: #e74c3c; margin: 10px 0 30px 0; font-weight: bold;}
        .result-box { background:#ecf0f1; border: 2px solid #bdc3c7; padding:20px; border-radius:10px; margin:20px 0; text-align: left; font-size: 1.2em; max-width: 500px; margin-left: auto; margin-right: auto;}

        .hidden { display: none !important; }

        .custom-modal input:focus { border-color: #3498db; }

        .custom-modal button.btn-cancel { background: #7f8c8d; margin-left: 10px; }

    <!-- 引入 PeerJS -->

<body>

<button class="btn-host" id="btn-host-login" onclick="showHostLogin()">👨‍🏫 主持人入口</button>

<div class="container">
    <h1 id="main-title">🧬 7年級生物期末複習對戰版</h1>
    
    <!-- 玩家資訊列 -->
    <div id="player-header">
        <div class="score-board">
            👤 姓名：<span id="my-name-display"></span> 
            | 🛡️ 隊伍：<span id="my-team-name">未分組</span>
            <br>
            ⭐ 個人總分：<span id="my-score" style="color:#2ecc71; font-size:1.2em;">0</span> 分
        </div>
        <div class="timer" id="player-timer">20</div>
    </div>

    <!-- 主持人面板 -->
    <div id="host-panel">
        <button class="btn-host-action btn-host-reset" onclick="hostResetGame()">🔄 重新開始 (清除紀錄並踢出學生)</button>
        <h2 style="margin-top:0; color:#333;">👑 主持人控制台</h2>
        
        <p style="font-size:1.2em; text-align:center; font-weight:bold; color:#2980b9;">連線人數：<span id="player-count">0 / 20</span></p>
        
        <div id="group-controls" style="display:flex; gap:10px; align-items:center; margin-bottom:15px; background:white; padding:15px; border-radius:8px;">
            <label style="font-weight:bold; font-size:1.1em;">選擇分組數：</label>
            <select id="team-count-select" style="font-size:1.1em; padding:5px;">
                <option value="0">不分組</option>
                <option value="2">分 2 組</option>
                <option value="3">分 3 組</option>
                <option value="4">分 4 組</option>
            </select>
            <button class="btn-host-action btn-host-team" style="margin-top:0;" onclick="hostAssignTeams()">🎲 隨機分組</button>
        </div>

        <div id="host-player-list"></div>
        
        <div id="host-question-display"></div>
        <div id="host-answer-info" style="margin-top:20px; font-size:1.4em; font-weight:bold; color:#e74c3c; display:none; text-align:center; background: white; padding: 15px; border-radius: 8px;"></div>
        
        <div class="timer" id="host-timer" style="text-align:center; color:#333; margin-top: 15px;"></div>

        <button class="btn-host-action btn-host-start" id="host-btn-next" onclick="hostStartOrNext()" style="display:none;">開始遊戲 / 派發第一題</button>
        <button class="btn-host-action btn-host-reveal" id="host-btn-reveal" onclick="hostReveal()" style="display:none;">公佈解答 (結算本題分數)</button>
        <button class="btn-host-action btn-host-end" id="host-btn-end" onclick="hostEndGame()" style="display:none; margin-top: 10px;">🛑 結束測驗並看總成績</button>
    </div>

    <!-- 首頁 -->
    <div id="start-screen">
        <h2>歡迎！請輸入您的名字或組別</h2>
        <p style="color:#7f8c8d;">(目前房間人數限制 20 人)</p>
        <input type="text" id="student-name" placeholder="例如：王小明" required>
        <br>
        <button class="btn-start" onclick="joinGame()">加入遊戲</button>
        <p id="name-error" style="color:#e74c3c; display:none; margin-top:10px; font-weight:bold;"></p>
    </div>

    <!-- 測驗區域 -->
    <div id="quiz-area"></div>

    <!-- 結算畫面 -->
    <div id="result-screen">
        <h2>📊 最終結算成績</h2>
        
        <!-- 隊伍排名 -->
        <div class="result-box" id="final-team-scores"></div>
        
        <!-- 個人成績 (老師端顯示全班，學生端顯示自己) -->
        <div class="result-box" id="final-personal-scores"></div>

        <div id="student-only-end" class="hidden">
            <p style="font-size:1.5em; margin-bottom:0;">個人總得分</p>
            <div class="score-display"><span id="final-score-display">0</span> 分</div>
        </div>
    </div>
</div>

<!-- 等待畫面 -->
<div id="waiting-overlay">
    <div id="wait-msg">等待連線中...</div>
    <div style="font-size:0.5em; margin-top:20px; color:#bdc3c7;">(若卡住過久，請重新整理網頁)</div>
</div>

<!-- 客製化 Alert 彈窗 -->
<div class="custom-modal" id="alert-modal">
    <div class="custom-modal-content">
        <h3 id="alert-msg">提示訊息</h3>
        <button onclick="document.getElementById('alert-modal').style.display='none'">確定</button>
    </div>
</div>

<!-- 客製化 Confirm 彈窗 -->
<div class="custom-modal" id="confirm-modal">
    <div class="custom-modal-content">
        <h3 id="confirm-msg">確定嗎？</h3>
        <button id="confirm-yes-btn">確定</button>
        <button class="btn-cancel" onclick="document.getElementById('confirm-modal').style.display='none'">取消</button>
    </div>
</div>

<!-- 客製化 Prompt 彈窗 -->
<div class="custom-modal" id="prompt-modal">
    <div class="custom-modal-content">
        <h3>請輸入主持人密碼</h3>
        <input type="password" id="host-pwd-input" placeholder="請輸入密碼">
        <div style="color:#e74c3c; display:none; margin-bottom:10px;" id="host-pwd-error">密碼錯誤！</div>
        <br>
        <button onclick="submitHostLogin()">確認</button>
        <button class="btn-cancel" onclick="document.getElementById('prompt-modal').style.display='none'">取消</button>
    </div>
</div>

function showAlert(msg) {
    document.getElementById('alert-msg').innerText = msg;
    document.getElementById('alert-modal').style.display = 'flex';
}

function showConfirm(msg, onConfirm) {
    document.getElementById('confirm-msg').innerText = msg;
    document.getElementById('confirm-yes-btn').onclick = function() {
        document.getElementById('confirm-modal').style.display = 'none';
        onConfirm();
    };
    document.getElementById('confirm-modal').style.display = 'flex';
}

function showHostLogin() {
    document.getElementById('host-pwd-input').value = '';
    document.getElementById('host-pwd-error').style.display = 'none';
    document.getElementById('prompt-modal').style.display = 'flex';
}

function shuffleArray(arr) {
    let copy = [...arr];
    for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
}

function safeSend(connection, data) {
    try {
        if (connection && connection.open) connection.send(data);
    } catch (e) {
        console.warn('send failed', e);
    }
}

function broadcast(data) {
    for (let pid in hostConnections) safeSend(hostConnections[pid], data);
}

function recalculateTeamScores() {
    for (let t in teamsInfo) teamsInfo[t].score = 0;
    for (let pid in playersData) {
        let p = playersData[pid];
        if (p.team && teamsInfo[p.team]) teamsInfo[p.team].score += (p.score || 0);
    }
}

function assignPlayerToSmallestTeam(peerId) {
    if (!playersData[peerId] || Object.keys(teamsInfo).length === 0) return;

    let counts = {};
    for (let i = 1; i <= numTeams; i++) counts[i] = 0;

    for (let pid in playersData) {
        let t = playersData[pid].team;
        if (t && counts[t] !== undefined) counts[t]++;
    }

    let smallestTeams = [];
    let minCount = Infinity;
    for (let i = 1; i <= numTeams; i++) {
        if (counts[i] < minCount) {
            minCount = counts[i];
            smallestTeams = [i];
        } else if (counts[i] === minCount) {
            smallestTeams.push(i);
        }
    }

    let assignedTeam = smallestTeams[Math.floor(Math.random() * smallestTeams.length)];
    playersData[peerId].team = assignedTeam;
}

function initHostPeer() {
    if (peer) { try { peer.destroy(); } catch(e){} }
    
    // 建立老師房間並綁定 Google STUN 以提高連線成功率
    peer = new Peer(ROOM_ID, {
        debug: 2,
        config: {
            'iceServers': [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        }
    });

    peer.on('open', (id) => {
        hostInitState();
        showAlert("✅ 房間已成功開啟！請通知學生輸入姓名加入遊戲。");
    });

    peer.on('connection', (connection) => {
        hostConnections[connection.peer] = connection;

        connection.on('open', () => {
            safeSend(connection, { type: 'state', status: currentLocalStatus, teamsInfo: teamsInfo });
        });

        connection.on('data', (data) => {
            if (data.type === 'join') {
                // 檢查名字是否重複 (過濾同名)
                let nameExists = false;
                for (let pid in playersData) {
                    if (playersData[pid].name === data.name && pid !== connection.peer) {
                        nameExists = true;
                        break;
                    }
                }
                if (nameExists) {
                    safeSend(connection, { type: 'name_taken' });
                    return;
                }

                if (Object.keys(playersData).length >= MAX_PLAYERS && !playersData[connection.peer]) {
                    safeSend(connection, { type: 'room_full' });
                    return;
                }
                playersData[connection.peer] = {
                    name: data.name, team: 0, score: 0, hasSubmitted: false, answer: null, isCorrect: null
                };

                // 若已經完成分組，後加入者不打亂原組別，
                // 直接優先補進人數較少的隊伍；人數相同時隨機加入其中一隊。
                if (Object.keys(teamsInfo).length > 0) {
                    assignPlayerToSmallestTeam(connection.peer);
                }

                updateHostUI();
                sendPlayerUpdate(connection.peer);

                if (currentLocalStatus === 'finished') {
                    safeSend(connection, { type: 'end_game', teamsInfo: teamsInfo, playersData: playersData });
                } else if (currentLocalStatus === 'answering' || currentLocalStatus === 'revealed') {
                    safeSend(connection, { type: 'state', status: currentLocalStatus, teamsInfo: teamsInfo });
                }
            }
            else if (data.type === 'submit') {
                if(playersData[connection.peer]) {
                    playersData[connection.peer].hasSubmitted = true;
                    playersData[connection.peer].answer = data.answer;
                    updateHostUI();
                }
            }
        });

        connection.on('close', () => {
            delete hostConnections[connection.peer];
            updateHostUI();
        });
    });

    peer.on('error', (err) => {
        if(err.type === 'unavailable-id') {
            showAlert("房間建立失敗！可能已經有其他老師開啟了這個網頁，請確認。");
        } else {
            console.error(err);
        }
    });
}

function hostAssignTeams() {
    const pKeys = Object.keys(playersData);
    numTeams = parseInt(document.getElementById("team-count-select").value);

    if (numTeams === 0) {
        teamsInfo = {};
        pKeys.forEach((pid) => {
            playersData[pid].team = 0;
            playersData[pid].score = 0;
            playersData[pid].hasSubmitted = false;
            playersData[pid].isCorrect = null;
            playersData[pid].answer = null;
        });

        document.getElementById("group-controls").style.display = "none";
        document.getElementById("host-btn-next").style.display = "block";
        updateHostUI();

        for (let pid in hostConnections) {
            sendPlayerUpdate(pid);
        }
        showAlert("已設定為不分組，可以開始派題了。");
        return;
    }
    
    if (pKeys.length < numTeams) {
        showAlert(`至少需要 ${numTeams} 名玩家才能分成 ${numTeams} 組！`);
        return;
    }

    pKeys.sort(() => Math.random() - 0.5);
    let pkmns = shuffleArray(pokemonNames);
    
    teamsInfo = {};
    for(let i=1; i<=numTeams; i++) {
        teamsInfo[i] = { name: pkmns[i-1] + "隊", score: 0 };
    }

    pKeys.forEach((pid, index) => {
        let teamNum = (index % numTeams) + 1;
        playersData[pid].team = teamNum;
        playersData[pid].score = 0;
        playersData[pid].hasSubmitted = false;
        playersData[pid].isCorrect = null;
        playersData[pid].answer = null;
    });

    document.getElementById("group-controls").style.display = "none";
    document.getElementById("host-btn-next").style.display = "block";
    updateHostUI();
    
    for (let pid in hostConnections) {
        sendPlayerUpdate(pid);
    }
    showAlert(`已成功隨機分成 ${numTeams} 組！可以開始派題了。`);
}

function sendPlayerUpdate(peerId) {
    const p = playersData[peerId];
    if (!p || !hostConnections[peerId]) return;

    recalculateTeamScores();
    let teamName = p.team ? teamsInfo[p.team].name : "未分組";
    let teamScore = p.team && teamsInfo[p.team] ? teamsInfo[p.team].score : 0;
    safeSend(hostConnections[peerId], {
        type: 'player_update',
        teamName: teamName,
        myScore: p.score || 0,
        teamScore: teamScore
    });
}

function updateHostUI() {
    let pCount = Object.keys(playersData).length;
    let submitCount = 0;
    
    recalculateTeamScores();

    function renderPlayerTag(pid) {
        let p = playersData[pid];
        let stateClass = p.hasSubmitted ? "submitted" : "";
        if (currentLocalStatus === 'revealed' || currentLocalStatus === 'finished') {
            if(p.isCorrect !== null) stateClass = p.isCorrect ? "correct-tag" : "wrong-tag";
        }
        if (p.hasSubmitted) submitCount++;
        return `<div class="player-tag ${stateClass}">
                    <span>${p.name} ${p.hasSubmitted && currentLocalStatus==='answering' ? '✅' : ''}</span>
                    <span>${p.score || 0} 分</span>
                </div>`;
    }

    let html = "";
    if (Object.keys(teamsInfo).length > 0) {
        html = `<div class="host-team-columns grid-${numTeams}">`;
        for(let i=1; i<=numTeams; i++) {
            let teamHtml = "";
            for(let pid in playersData) {
                if (playersData[pid].team === i) teamHtml += renderPlayerTag(pid);
            }
            let bgClass = `team-${i}-bg`;
            html += `<div class="host-team-column ${bgClass}">
                        <h3>${teamsInfo[i].name}｜${teamsInfo[i].score} 分</h3>
                        ${teamHtml || '<div style="color:#7f8c8d; text-align:center;">尚無隊員</div>'}
                     </div>`;
        }
        html += `</div>`;
    } else {
        html += `<div class="host-team-columns grid-4">`;
        for(let pid in playersData) html += renderPlayerTag(pid);
        html += `</div>`;
    }

    document.getElementById("player-count").innerText = `${pCount} / ${MAX_PLAYERS} (本題已答: ${submitCount})`;
    document.getElementById("host-player-list").innerHTML = html;
}

function hostStartOrNext() {
    let nextQ = currentLocalStatus === 'waiting' ? 0 : currentQ + 1;
    if (nextQ >= rawQuestions.length) {
        hostEndGame();
        return;
    }

    currentQ = nextQ;
    currentLocalStatus = 'answering';

    for(let pid in playersData) {
        playersData[pid].hasSubmitted = false;
        playersData[pid].isCorrect = null;
        playersData[pid].answer = null;
    }

    let realQIndex = globalQuestionOrder[currentQ];
    let q = rawQuestions[realQIndex];
    const questionDurationMs = 20000; // 20秒
    const timerEndTime = Date.now() + questionDurationMs

    document.getElementById("host-btn-next").style.display = "none";
    document.getElementById("host-btn-reveal").style.display = "block";
    document.getElementById("host-answer-info").style.display = "none";

    let qDisplay = document.getElementById("host-question-display");
    qDisplay.style.display = "block";
    let optionsHtml = q.o.map((opt, i) => `<li><b>${optionLabels[i]}.</b> ${opt}</li>`).join('');
    qDisplay.innerHTML = `<h3 style="margin:0 0 10px 0; color:#2c3e50; border-bottom:1px solid #ddd; padding-bottom:5px;">第 ${currentQ + 1} 題</h3>
                          <p style="font-size:1.2em; font-weight:bold;">${q.q}</p>
                          <ul class="host-option-list">${optionsHtml}</ul>`;

    updateHostUI();
    manageHostTimer(timerEndTime);
    
    broadcast({
        type: 'question',
        qIndex: currentQ,
        realQIndex: realQIndex,
        totalQ: rawQuestions.length,
        endTime: timerEndTime,
        durationMs: questionDurationMs
    });
}

function manageHostTimer(endTime) {
    clearInterval(timerInterval);
    const hostT = document.getElementById("host-timer");
    
    timerInterval = setInterval(() => {
        let left = Math.ceil((endTime - Date.now()) / 1000);
        if (left <= 0) {
            clearInterval(timerInterval);
            hostT.innerText = "時間到！";
            hostT.classList.add('danger');
            
            if(currentLocalStatus === 'answering') {
                hostReveal(); // 自動公布解答
            }
        } else {
            hostT.innerText = left + " 秒";
            if(left <= 5) hostT.classList.add('danger');
            else hostT.classList.remove('danger');
        }
    }, 200);
}

function hostReveal() {
    clearInterval(timerInterval);
    currentLocalStatus = 'revealed';
    document.getElementById("host-timer").innerText = "已公布解答";
    document.getElementById("host-timer").classList.remove('danger');
    
    let realQIndex = globalQuestionOrder[currentQ];
    let correctAns = rawQuestions[realQIndex].a;

    for(let pid in playersData) {
        let p = playersData[pid];
        if (p.hasSubmitted && p.answer === correctAns) {
            p.isCorrect = true;
            p.score += 1; 
        } else {
            p.isCorrect = false;
        }
    }

    updateHostUI();

    let ansText = optionLabels[correctAns] + ". " + rawQuestions[realQIndex].o[correctAns];
    let info = document.getElementById("host-answer-info");
    info.innerHTML = `⭐ 正確答案：${ansText}`;
    info.style.display = "block";

    document.getElementById("host-btn-reveal").style.display = "none";
    document.getElementById("host-btn-next").style.display = "block";
    document.getElementById("host-btn-next").innerText = "下一題 ➡";

    for(let pid in hostConnections) {
        sendPlayerUpdate(pid); 
        safeSend(hostConnections[pid], { type: 'reveal', correctAns: correctAns });
    }
}

function initStudentPeer() {
    if (peer) { try { peer.destroy(); } catch(e){} }
    
    // 學生 ID 由系統分配，加入 Google STUN 伺服器提高連通率
    peer = new Peer(null, { 
        debug: 2,
        config: {
            'iceServers': [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        }
    }); 

    peer.on('open', (id) => {
        connectToHost();
    });

    peer.on('error', (err) => {
        console.error("Student Peer Error", err);
        // 如果找不到老師房間 (通常是因為老師還沒開啟，或是網路問題)，將會自動每3秒重試
        if (err.type === 'peer-unavailable') {
            document.getElementById("wait-msg").innerHTML = "找不到老師的房間，3秒後自動重試...<br><span style='font-size:0.6em;'>(請確認老師已經登入)</span>";
            setTimeout(connectToHost, 3000);
        } else {
            document.getElementById("wait-msg").innerHTML = "連線發生異常，請重新整理網頁再試！<br>錯誤代碼：" + err.type;
        }
    });
}

function connectToHost() {
    if (!peer || peer.destroyed) return;
    
    conn = peer.connect(ROOM_ID, { reliable: true });
    
    conn.on('open', () => {
        conn.send({ type: 'join', name: studentName });
        document.getElementById("wait-msg").innerText = "已連線！等待老師分組與派題...";
    });

    conn.on('data', (data) => {
        if (data.type === 'state') {
            if (data.status === 'answering' || data.status === 'revealed') {
                document.getElementById("wait-msg").innerText = "遊戲進行中，請等候下一題派發...";
            } else if (data.status === 'finished') {
                showStudentResults(data.teamsInfo, data.playersData);
            }
        }
        else if (data.type === 'name_taken') {
            isNameTaken = true;
            document.getElementById("waiting-overlay").style.display = "none";
            document.getElementById("start-screen").style.display = "block";
            document.getElementById("btn-host-login").style.display = "block";
            
            let errEl = document.getElementById("name-error");
            errEl.innerText = "這個名字已經有人使用了，請換一個名字！";
            errEl.style.display = "block";
            
            if (conn) conn.close();
            if (peer) { peer.destroy(); peer = null; }
        }
        else if (data.type === 'room_full') {
            showAlert("房間已滿 (最多20人)！");
            setTimeout(() => location.reload(), 2000);
        }
        else if (data.type === 'force_reset') {
            showAlert("老師已重置遊戲，請重新輸入姓名加入！");
            setTimeout(() => location.reload(), 2000);
        }
        else if (data.type === 'player_update') {
            document.getElementById("player-header").style.display = "block";
            document.getElementById("my-name-display").innerText = studentName;
            document.getElementById("my-score").innerText = data.myScore;
            document.getElementById("my-team-name").innerText = data.teamName;
        }
        else if (data.type === 'question') {
            document.getElementById("waiting-overlay").style.display = "none";
            document.getElementById("result-screen").style.display = "none";
            document.getElementById("quiz-area").style.display = "block";
            renderStudentQuestion(data.realQIndex, data.qIndex, data.totalQ, data.endTime, data.durationMs);
        }
        else if (data.type === 'reveal') {
            studentReveal(data.correctAns);
        }
        else if (data.type === 'end_game') {
            showStudentResults(data.teamsInfo, data.playersData);
        }
    });

    conn.on('close', () => {
        if (isNameTaken) {
            isNameTaken = false;
            return;
        }
        document.getElementById("waiting-overlay").style.display = "flex";
        document.getElementById("wait-msg").innerHTML = "與老師斷線了，系統正在嘗試重新連線...<br><span style='font-size:0.6em;'>(或請重新整理網頁)</span>";
        setTimeout(connectToHost, 3000);
    });
    
    conn.on('error', (err) => {
        document.getElementById("wait-msg").innerHTML = "連線發生錯誤，系統自動重試中...";
        setTimeout(connectToHost, 3000);
    });
}

function renderStudentQuestion(realQIndex, qIndex, totalQ, endTime, durationMs) {
    currentLocalStatus = 'answering';
    answered = false;
    const q = rawQuestions[realQIndex];

    let html = `<div class="question-box active">
                    <div class="question-title">
                        第 ${qIndex + 1} 題 / 共 ${totalQ} 題<br><br>
                        ${q.q}
                    </div>
                    <div id="options-area">`;
    
    q.o.forEach((opt, index) => {
        html += `<div class="option" onclick="studentSelectOption(${index}, this)"><b>${optionLabels[index]}.</b> ${opt}</div>`;
    });

    html += `</div>
             <div class="selection-hint" id="selection-hint" style="color:#e67e22;">請選擇 1 個選項</div>
             <button class="btn-submit" id="submit-btn" onclick="studentSubmit()" disabled>確認送出</button>
             <div class="feedback" id="feedback-msg"></div>`;
             
    document.getElementById("quiz-area").innerHTML = html;
    manageStudentTimer(endTime, durationMs);
}

function manageStudentTimer(endTime, durationMs) {
    clearInterval(timerInterval);
    const pTimer = document.getElementById("player-timer");
    const subBtn = document.getElementById("submit-btn");
    const localEndTime = durationMs ? Date.now() + durationMs : endTime;

    timerInterval = setInterval(() => {
        let left = Math.ceil((localEndTime - Date.now()) / 1000);
        if (left <= 0) {
            clearInterval(timerInterval);
            pTimer.innerText = "時間到！";
            pTimer.classList.add('danger');

            if (!answered) {
                answered = true;
                subBtn.disabled = true;
                subBtn.innerText = "時間到，未作答";
                document.getElementById("selection-hint").innerText = "";
            }
        } else {
            pTimer.innerText = left;
            if(left <= 5) pTimer.classList.add('danger');
            else pTimer.classList.remove('danger');
        }
    }, 200);
}

function studentSelectOption(index, el) {
    if (answered) return; 

    const submitBtn = document.getElementById("submit-btn");
    const hintDiv = document.getElementById("selection-hint");

    document.querySelectorAll(".option").forEach(opt => opt.classList.remove('selected'));
    el.classList.add('selected');
    el.dataset.index = index; 
    
    hintDiv.innerText = "已選定，請按下確認送出";
    hintDiv.style.color = "#27ae60";
    submitBtn.disabled = false;
}

function studentSubmit() {
    if (answered) return;
    
    const selectedEl = document.querySelector(".option.selected");
    let ansIndex = selectedEl ? parseInt(selectedEl.dataset.index) : null;

    answered = true;
    const btn = document.getElementById("submit-btn");
    btn.disabled = true;
    btn.innerText = "等待老師公布解答...";
    document.getElementById("selection-hint").innerText = "";

    if (conn && conn.open) {
        conn.send({ type: 'submit', answer: ansIndex });
    }
}

function studentReveal(correctAns) {
    clearInterval(timerInterval);
    currentLocalStatus = 'revealed';
    document.getElementById("player-timer").innerText = "結算中";
    
    const selectedEl = document.querySelector(".option.selected");
    let myAns = selectedEl ? parseInt(selectedEl.dataset.index) : null;
    
    const allOpts = document.querySelectorAll(".option");
    
    allOpts.forEach((opt, idx) => {
        opt.classList.remove("selected");
        if (idx === correctAns) {
            opt.classList.add("correct"); 
        } else if (idx === myAns && myAns !== correctAns) {
            opt.classList.add("wrong"); 
        }
    });

    const fb = document.getElementById("feedback-msg");
    if (myAns === null) {
        fb.innerHTML = "<span style='color:#7f8c8d;'>未作答 ⏳</span>";
    } else if (myAns === correctAns) {
        fb.innerHTML = "<span style='color:#28a745;'>答對了！ +1 分 🎉</span>";
    } else {
        fb.innerHTML = "<span style='color:#e74c3c;'>答錯囉 📖</span>";
    }

    document.getElementById("submit-btn").style.display = "none";
}

function showStudentResults(finalTeamsInfo, finalPlayersData) {
    clearInterval(timerInterval);
    currentLocalStatus = 'finished';
    document.getElementById("quiz-area").style.display = "none";
    document.getElementById("host-panel").style.display = "none";
    document.getElementById("result-screen").style.display = "block";
    document.getElementById("player-header").style.display = "none";
    document.getElementById("waiting-overlay").style.display = "none";

    let myScore = document.getElementById("my-score") ? document.getElementById("my-score").innerText : "0";
    document.getElementById("final-score-display").innerText = myScore;
    document.getElementById("student-only-end").classList.remove("hidden");

    let personalBox = document.getElementById("final-personal-scores");
    personalBox.style.display = "block";
    personalBox.innerHTML = `<h3 style='margin-top:0; border-bottom:2px solid #bdc3c7; padding-bottom:5px;'>👤 我的成績</h3>
                             <div><b>${studentName}</b>：${myScore} 分</div>`;

    if(finalTeamsInfo && Object.keys(finalTeamsInfo).length > 0) {
        let tBox = document.getElementById("final-team-scores");
        tBox.style.display = "block";

        let tHtml = "<h3 style='margin-top:0; border-bottom:2px solid #bdc3c7; padding-bottom:5px;'>🏆 隊伍對決結果</h3>";

        let tArr = Object.values(finalTeamsInfo).sort((a,b) => b.score - a.score);
        tArr.forEach((t, i) => {
            let medal = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : "🔹";
            tHtml += `<div style="margin-bottom:8px;">${medal} <b>${t.name}</b>：${t.score} 分</div>`;
        });

        tBox.innerHTML = tHtml;
    }
}
</script>
